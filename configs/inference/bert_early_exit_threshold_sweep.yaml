# Inference configuration for dynamic early-exit threshold sweeps
maximum_sequence_length: 384
document_stride: 128
pad_to_maximum_length: true
pad_to_multiple_of: 8

per_device_evaluation_batch_size: 16
dataloader_num_workers: 2
number_of_warmup_batches: 10
power_sampling_interval_seconds: 0.02

n_best_size: 20
maximum_answer_length: 30
no_answer_probability_threshold: 0.06458

# Confidence thresholds for entropy-based early exit
early_exit_confidence_thresholds:
  - 1.01
  - 0.90
  - 0.80
  - 0.70
  - 0.60
  - 0.50