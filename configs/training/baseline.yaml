# Training configuration to establish baseline
random_seed: 42

maximum_sequence_length: 384
document_stride: 128
pad_to_maximum_length: false

learning_rate: 3.0e-05
weight_decay: 0.01

# Longer training for a real baseline
number_of_training_epochs: 2

per_device_training_batch_size: 8
per_device_evaluation_batch_size: 16
gradient_accumulation_steps: 1

# Warmup in steps (Transformers 5.x)
warmup_steps: 500
logging_steps: 100

# Save checkpoints
save_strategy: "steps"
save_steps: 10000
save_total_limit: 1
save_only_model: true

# Evaluate periodically
evaluation_strategy: "steps"
evaluation_steps: 1000

use_fp16: false
use_bf16: false

dataloader_num_workers: 2

# Finer sampling for longer runs
power_sampling_interval_seconds: 0.2

# No-answer probability threshold for explicit empty-string predictions
no_answer_probability_threshold: 0.06458