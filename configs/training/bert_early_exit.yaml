# Training configuration for three-exit BERT QA model
random_seed: 42
maximum_sequence_length: 384
document_stride: 128
pad_to_maximum_length: false
pad_to_multiple_of: 8

# Exit heads after encoder layers 4, 8, and 12
early_exit_layers:
  - 4
  - 8
  - 12

# Uniform loss weighting across exits
early_exit_loss_weights:
  - 1.0
  - 1.0
  - 1.0

learning_rate: 3.0e-05
weight_decay: 0.01
number_of_training_epochs: 1.0
per_device_training_batch_size: 8
per_device_evaluation_batch_size: 16
gradient_accumulation_steps: 1
warmup_steps: 500
logging_steps: 100
save_strategy: steps
save_steps: 1000
save_total_limit: 1
save_only_model: true
evaluation_strategy: steps
evaluation_steps: 1000
dataloader_num_workers: 2
power_sampling_interval_seconds: 0.2